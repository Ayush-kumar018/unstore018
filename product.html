<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Products</title>

<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#050505;
color:white;
}

/* HERO */

.hero{
padding:120px 8% 60px;
background:
radial-gradient(circle at center,#1a1a1a 0%,#050505 70%);
border-bottom:1px solid #151515;
}

.hero-layout{
display:flex;
gap:80px;
align-items:center;
}

/* SIDEBAR */

.sidebar{
width:220px;
flex-shrink:0;
}

.sidebar h2{
font-size:13px;
font-weight:300;
letter-spacing:4px;
color:#666;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin-bottom:18px;
}

.sidebar a{
color:#888;
text-decoration:none;
font-size:18px;
transition:.3s;
}

.sidebar a:hover{
color:#d4ff00;
padding-left:10px;
}

/* TITLE AREA */

.hero-content{
flex:1;
}

.hero-content h1{
font-size:clamp(3rem,7vw,6rem);
font-weight:900;
line-height:.95;
color:white;
}

.hero-content p{
margin-top:20px;
font-size:1.2rem;
color:#999;
max-width:600px;
}

/* PRODUCTS */

.grid{
padding:60px 8% 100px;
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.product{
background:#111;
border:1px solid #222;
border-radius:20px;
overflow:hidden;
transition:.4s;
}

.product:hover{
transform:translateY(-10px);
border-color:#d4ff00;
}

.product img{
width:100%;
height:300px;
object-fit:cover;
background:#1a1a1a;
}

.product-info{
padding:20px;
}

.product h3{
font-size:1.3rem;
margin-bottom:10px;
}

.product p{
color:#aaa;
line-height:1.6;
}

.price{
margin-top:15px;
font-size:28px;
font-weight:800;
color:#d4ff00;
}

.btn{
margin-top:15px;
width:100%;
padding:14px;
background:#d4ff00;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* MOBILE */
/* FILTER BUTTON */

.top-actions{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    padding:30px 8% 0;
}

.action-btn{
    background:#151515;
    color:#fff;
    border:1px solid #2a2a2a;
    border-radius:50px;
    padding:14px 28px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.action-btn:hover{
    background:#d4ff00;
    color:#000;
}
/* ===============================
   FILTER DRAWER
=================================*/

.filter-drawer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px);

    display:none;

    justify-content:flex-end;
    align-items:flex-end;

    z-index:9999;
}

.filter-content{

    width:100%;
    max-width:420px;

    background:#111;

    border-radius:25px 25px 0 0;

    padding:25px;

    animation:slideUp .35s ease;
}

.filter-header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:25px;
}

.filter-header h2{

    font-size:24px;
}

.filter-header button{

    background:none;
    border:none;

    color:white;

    font-size:28px;

    cursor:pointer;
}

.filter-group h3{

    margin-bottom:15px;
}

.filter-group label{

    display:flex;
    align-items:center;

    gap:12px;

    padding:14px 0;

    font-size:17px;

    cursor:pointer;

    border-bottom:1px solid #222;
}

.filter-group input{

    accent-color:#d4ff00;

    width:18px;
    height:18px;
}

.apply-btn{

    width:100%;

    margin-top:30px;

    padding:16px;

    background:#d4ff00;

    color:#000;

    border:none;

    border-radius:14px;

    font-size:17px;

    font-weight:700;

    cursor:pointer;
}
.filter-actions{
    display:flex;
    gap:15px;
    margin-top:30px;
}

.reset-btn{
    flex:1;
    padding:16px;
    background:transparent;
    color:#fff;
    border:1px solid #333;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.reset-btn:hover{
    border-color:#d4ff00;
    color:#d4ff00;
}

.apply-btn{
    flex:2;
}
@keyframes slideUp{

    from{
        transform:translateY(100%);
    }

    to{
        transform:translateY(0);
    }
}
@media(max-width:900px){

.hero-layout{
flex-direction:column;
align-items:flex-start;
gap:50px;
}

.sidebar{
width:100%;
}

.hero-content h1{
font-size:3rem;
}
.product-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.product-top h3{
    margin:0;
    flex:1;
}

.wishlist-btn{
    font-size:28px;
    cursor:pointer;
    margin-left:15px;
}
}
.product-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
}

.product-header h3{
    flex:1;
    margin:0;
    font-size:24px;
    line-height:1.3;
}

.wishlist-btn{
    flex-shrink:0;
    font-size:28px;
    cursor:pointer;
}
.product-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:12px;
}

.product-top h3{
    margin:0;
    flex:1;
    color:#fff;
}

.wishlist-btn{
    font-size:30px;
    cursor:pointer;
    flex-shrink:0;
}
</style>

</head>

<body>
<section class="hero">

<div class="hero-layout">

<div class="sidebar">

<h2>SHOP MORE</h2>

<ul>
<li><a href="product.html?category=whey-concentrate">Whey Protein</a></li>
<li><a href="product.html?category=creatine">Creatine</a></li>
<li><a href="product.html?category=pre-workout">Pre Workout</a></li>
<li><a href="product.html?category=fat-burner">Fat Burner</a></li>
<li><a href="product.html?category=mass-gainer">Mass Gainer</a></li>
<li><a href="product.html?category=bcaa">BCAA</a></li>
<li><a href="product.html?category=vitamins">Vitamins</a></li>
</ul>

</div>

<div class="hero-content">

<h1 id="title">WHEY PROTEIN</h1>

<p id="subtitle">
Premium whey protein for muscle growth, recovery and strength.
</p>

</div>

</div>

</section>

<section class="products">

    <!-- Filter Button -->
    

        <div class="top-actions">

    <button id="openFilter" class="action-btn">
        ☰ Filter
    </button>

    <button id="openSort" class="action-btn">
        ⇅ Sort
    </button>

</div>
   

    <!-- Products -->
    <div class="grid" id="productsContainer"></div>

</section>
</div>
</div>

<div id="filterDrawer" class="filter-drawer">

    <div class="filter-content">

        <div class="filter-header">
            <h2>Filters</h2>

            <button id="closeFilter">✕</button>
        </div>

        <div class="filter-group">

            <h3>Budget</h3>

            <label>
                <input type="radio" name="budget" value="all" checked>
                All
            </label>

            <label>
                <input type="radio" name="budget" value="1000">
                Under ₹1000
            </label>

            <label>
                <input type="radio" name="budget" value="2000">
                Under ₹2000
            </label>

            <label>
                <input type="radio" name="budget" value="3000">
                Under ₹3000
            </label>

            <label>
                <input type="radio" name="budget" value="5000">
                Under ₹5000
            </label>

        </div>
<div class="filter-actions">

    <button id="resetFilter" class="reset-btn">
        Reset
    </button>

    <button id="applyFilter" class="apply-btn">
        Apply
    </button>

</div>

    </div>
    </div>
    <!-- SORT DRAWER -->

<div id="sortDrawer" class="filter-drawer">

    <div class="filter-content">

        <div class="filter-header">

            <h2>Sort By</h2>

            <button id="closeSort">✕</button>

        </div>

        <div class="filter-group">

            <label>
                <input type="radio" name="sort" value="low-high">
                Price : Low to High
            </label>

            <label>
                <input type="radio" name="sort" value="high-low">
                Price : High to Low
            </label>

            <label>
                <input type="radio" name="sort" value="a-z">
                Name : A → Z
            </label>

            <label>
                <input type="radio" name="sort" value="z-a">
                Name : Z → A
            </label>

        </div>

        <button id="applySort" class="apply-btn">
            Apply
        </button>

    </div>



<script src="products.js"></script>
<script src="app.js"></script>
<!-- Filter Drawer -->

</div>
</body>
</html>
