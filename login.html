<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Ultimate Nutrition</title>

<style>
body{
background:#050505;
color:white;
font-family:Inter,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.form-box{
width:400px;
background:#111;
padding:30px;
border-radius:20px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#d4ff00;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#d4ff00;
border:none;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="form-box">

<h2>Login</h2>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email"
required>

<input
type="password"
id="loginPassword"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
</body>
</html>
